<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TRACE EM — Entity Relationship Diagram</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1e1e2e;
    overflow: hidden;
    user-select: none;
  }

  /* ── Top Bar ── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 44px;
    background: #252540;
    border-bottom: 1px solid #3a3a5c;
    display: flex;
    align-items: center;
    padding: 0 18px;
    gap: 14px;
    z-index: 1000;
  }
  #topbar .logo {
    font-size: 15px;
    font-weight: 700;
    color: #a78bfa;
    letter-spacing: 1px;
  }
  #topbar .sep { width: 1px; height: 22px; background: #3a3a5c; }
  #topbar .hint { font-size: 11px; color: #6b7280; }
  #topbar .badge {
    margin-left: auto;
    font-size: 11px;
    color: #a78bfa;
    background: #2d2d4e;
    border: 1px solid #4c4c8a;
    border-radius: 4px;
    padding: 2px 8px;
  }

  /* ── Canvas ── */
  #canvas-wrap {
    position: fixed;
    top: 44px; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    cursor: grab;
  }
  #canvas-wrap.panning { cursor: grabbing; }

  #canvas {
    position: absolute;
    width: 5000px;
    height: 4000px;
    background-image:
      radial-gradient(circle, #3a3a5c 1px, transparent 1px);
    background-size: 24px 24px;
    background-color: #1e1e2e;
  }

  /* ── SVG Lines ── */
  #svg-layer {
    position: absolute;
    top: 0; left: 0;
    width: 5000px;
    height: 4000px;
    pointer-events: none;
  }

  /* ── Entity Card ── */
  .entity {
    position: absolute;
    width: 240px;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 6px 28px rgba(0,0,0,0.55);
    cursor: move;
    z-index: 10;
    transition: box-shadow 0.15s;
  }
  .entity:hover { box-shadow: 0 8px 36px rgba(167,139,250,0.35); z-index: 20; }
  .entity.active  { box-shadow: 0 0 0 2px #a78bfa, 0 8px 36px rgba(167,139,250,0.4); z-index: 30; }

  .entity-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.4px;
    cursor: move;
  }
  .entity-header .schema-label {
    font-size: 10px;
    font-weight: 400;
    opacity: 0.65;
    display: block;
    line-height: 1;
  }
  .entity-header .icon { font-size: 14px; flex-shrink: 0; }

  /* Colour themes per entity */
  .theme-firebase  .entity-header { background: #ff6b35; color: #fff; }
  .theme-users     .entity-header { background: #4c8cff; color: #fff; }
  .theme-orders    .entity-header { background: #22c55e; color: #fff; }
  .theme-ratings   .entity-header { background: #f59e0b; color: #fff; }
  .theme-receipts  .entity-header { background: #8b5cf6; color: #fff; }
  .theme-complaints .entity-header { background: #ef4444; color: #fff; }
  .theme-location  .entity-header { background: #06b6d4; color: #fff; }

  .entity-body {
    background: #252540;
    border: 1px solid #3a3a5c;
    border-top: none;
  }

  .field-row {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 5px 10px;
    font-size: 11.5px;
    color: #c9d1e0;
    border-bottom: 1px solid #2d2d4e;
    min-height: 28px;
  }
  .field-row:last-child { border-bottom: none; }
  .field-row:hover { background: #2d2d4e; }

  .field-icon { width: 16px; flex-shrink: 0; font-size: 12px; }
  .pk  { color: #f59e0b; }  /* gold key */
  .fk  { color: #a78bfa; }  /* purple key */
  .idx { color: #6b7280; }  /* grey bullet */

  .field-name { flex: 1; }
  .field-type {
    font-size: 10px;
    color: #6b7280;
    text-align: right;
    white-space: nowrap;
  }

  /* ── Legend ── */
  #legend {
    position: fixed;
    bottom: 18px;
    right: 18px;
    background: #252540;
    border: 1px solid #3a3a5c;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 11px;
    color: #9ca3af;
    z-index: 500;
  }
  #legend h4 { color: #c9d1e0; margin-bottom: 8px; font-size: 12px; }
  .leg-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .leg-line { width: 28px; height: 2px; }
  .leg-line.solid   { background: #a78bfa; }
  .leg-line.dashed  { border-top: 2px dashed #f59e0b; background: none; height: 0; }

  /* ── Controls ── */
  #controls {
    position: fixed;
    bottom: 18px;
    left: 18px;
    display: flex;
    gap: 8px;
    z-index: 500;
  }
  .ctrl-btn {
    background: #252540;
    border: 1px solid #3a3a5c;
    color: #c9d1e0;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .ctrl-btn:hover { background: #3a3a5c; }
</style>
</head>
<body>

<div id="topbar">
  <span class="logo">⚡ TRACE EM</span>
  <div class="sep"></div>
  <span class="hint">Entity Relationship Diagram — drag to pan • scroll to zoom • drag entities to rearrange</span>
  <span class="badge">7 Entities · 6 Relations</span>
</div>

<div id="canvas-wrap">
  <div id="canvas">
    <svg id="svg-layer"></svg>
    <!-- Entities injected by JS -->
  </div>
</div>

<div id="controls">
  <button class="ctrl-btn" onclick="resetView()">⌂ Reset View</button>
  <button class="ctrl-btn" onclick="zoomIn()">＋ Zoom In</button>
  <button class="ctrl-btn" onclick="zoomOut()">－ Zoom Out</button>
</div>

<div id="legend">
  <h4>Legend</h4>
  <div class="leg-row"><span style="color:#f59e0b;font-size:13px">🔑</span> Primary Key (PK)</div>
  <div class="leg-row"><span style="color:#a78bfa;font-size:13px">🗝️</span> Foreign Key (FK)</div>
  <div class="leg-row"><span style="color:#6b7280;font-size:13px">●</span> Column</div>
  <div class="leg-row"><div class="leg-line solid"></div> Firestore Relation</div>
  <div class="leg-row"><div class="leg-line dashed"></div> Cross-layer Ref</div>
</div>

<script>
// ─────────────────────────────────────────────
// DATA MODEL
// ─────────────────────────────────────────────
const entities = [
  {
    id: 'firebase_auth',
    label: 'FIREBASE_AUTH',
    sublabel: '🔐 Firebase Auth Service',
    theme: 'theme-firebase',
    icon: '🔒',
    x: 60, y: 80,
    fields: [
      { name: 'uid',          type: 'string',    kind: 'pk' },
      { name: 'email',        type: 'string',    kind: 'col' },
      { name: 'phoneNumber',  type: 'string',    kind: 'col' },
      { name: 'authProvider', type: 'string',    kind: 'col' },
    ]
  },
  {
    id: 'users',
    label: 'USERS',
    sublabel: '📁 Firestore · users',
    theme: 'theme-users',
    icon: '👤',
    x: 400, y: 60,
    fields: [
      { name: 'uid',          type: 'string',    kind: 'pk' },
      { name: 'username',     type: 'string',    kind: 'col' },
      { name: 'email',        type: 'string',    kind: 'col' },
      { name: 'phoneNumber',  type: 'string',    kind: 'col' },
      { name: 'address',      type: 'string',    kind: 'col' },
      { name: 'region',       type: 'string',    kind: 'col' },
      { name: 'role',         type: 'string',    kind: 'col' },
      { name: 'photoUrl',     type: 'string?',   kind: 'col' },
      { name: 'createdAt',    type: 'timestamp', kind: 'col' },
    ]
  },
  {
    id: 'orders',
    label: 'ORDERS',
    sublabel: '📁 Firestore · orders',
    theme: 'theme-orders',
    icon: '📦',
    x: 780, y: 60,
    fields: [
      { name: 'id',          type: 'string',    kind: 'pk' },
      { name: 'userId',      type: 'string',    kind: 'fk' },
      { name: 'orderNumber', type: 'string',    kind: 'col' },
      { name: 'status',      type: 'string',    kind: 'col' },
      { name: 'progress',    type: 'float',     kind: 'col' },
      { name: 'date',        type: 'timestamp', kind: 'col' },
      { name: 'region',      type: 'string',    kind: 'col' },
    ]
  },
  {
    id: 'ratings',
    label: 'RATINGS',
    sublabel: '📁 Firestore · ratings',
    theme: 'theme-ratings',
    icon: '⭐',
    x: 400, y: 380,
    fields: [
      { name: 'id',        type: 'string',    kind: 'pk' },
      { name: 'userId',    type: 'string',    kind: 'fk' },
      { name: 'driver',    type: 'string',    kind: 'col' },
      { name: 'user',      type: 'string',    kind: 'col' },
      { name: 'rating',    type: 'int',       kind: 'col' },
      { name: 'comment',   type: 'string',    kind: 'col' },
      { name: 'vehicle',   type: 'string',    kind: 'col' },
      { name: 'type',      type: 'string',    kind: 'col' },
      { name: 'timestamp', type: 'timestamp', kind: 'col' },
      { name: 'blocked',   type: 'boolean',   kind: 'col' },
    ]
  },
  {
    id: 'receipts',
    label: 'RECEIPTS',
    sublabel: '📁 Firestore · receipts',
    theme: 'theme-receipts',
    icon: '🧾',
    x: 780, y: 360,
    fields: [
      { name: 'id',      type: 'string',    kind: 'pk' },
      { name: 'orderId', type: 'string',    kind: 'fk' },
      { name: 'user',    type: 'string',    kind: 'col' },
      { name: 'amount',  type: 'float',     kind: 'col' },
      { name: 'type',    type: 'string',    kind: 'col' },
      { name: 'route',   type: 'string',    kind: 'col' },
      { name: 'date',    type: 'timestamp', kind: 'col' },
    ]
  },
  {
    id: 'complaints',
    label: 'COMPLAINTS',
    sublabel: '📁 Firestore · complaints',
    theme: 'theme-complaints',
    icon: '📝',
    x: 60, y: 380,
    fields: [
      { name: 'id',          type: 'string',    kind: 'pk' },
      { name: 'userId',      type: 'string',    kind: 'fk' },
      { name: 'userName',    type: 'string',    kind: 'col' },
      { name: 'description', type: 'string',    kind: 'col' },
      { name: 'status',      type: 'string',    kind: 'col' },
      { name: 'createdAt',   type: 'timestamp', kind: 'col' },
      { name: 'response',    type: 'string?',   kind: 'col' },
    ]
  },
  {
    id: 'location_updates',
    label: 'LOCATION_UPDATES',
    sublabel: '🐍 Python FastAPI · In-Memory',
    theme: 'theme-location',
    icon: '📍',
    x: 1140, y: 200,
    fields: [
      { name: 'id',        type: 'integer',   kind: 'pk' },
      { name: 'user_id',   type: 'string',    kind: 'fk' },
      { name: 'latitude',  type: 'float',     kind: 'col' },
      { name: 'longitude', type: 'float',     kind: 'col' },
      { name: 'region',    type: 'string',    kind: 'col' },
      { name: 'timestamp', type: 'timestamp', kind: 'col' },
    ]
  },
];

// Relations: [fromEntityId, fromField, toEntityId, toField, style, label]
const relations = [
  ['firebase_auth', 'uid',     'users',            'uid',     'solid',  '1 : 1'],
  ['users',         'uid',     'orders',           'userId',  'solid',  '1 : N'],
  ['users',         'uid',     'ratings',          'userId',  'solid',  '1 : N'],
  ['users',         'uid',     'complaints',       'userId',  'solid',  '1 : N'],
  ['users',         'uid',     'location_updates', 'user_id', 'dashed', '1 : N'],
  ['orders',        'id',      'receipts',         'orderId', 'solid',  '1 : 0..1'],
];

// ─────────────────────────────────────────────
// BUILD DOM
// ─────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const svg    = document.getElementById('svg-layer');

const ENTITY_WIDTH = 240;
const HEADER_H     = 44;
const ROW_H        = 28;

function entityHeight(e) {
  return HEADER_H + e.fields.length * ROW_H;
}

const domEntities = {};  // id → DOM element

entities.forEach(e => {
  const el = document.createElement('div');
  el.className = `entity ${e.theme}`;
  el.id = 'ent-' + e.id;
  el.style.left = e.x + 'px';
  el.style.top  = e.y + 'px';

  let html = `
    <div class="entity-header">
      <span class="icon">${e.icon}</span>
      <div>
        <span class="schema-label">${e.sublabel}</span>
        ${e.label}
      </div>
    </div>
    <div class="entity-body">`;

  e.fields.forEach(f => {
    let iconHtml = '';
    if (f.kind === 'pk')  iconHtml = `<span class="field-icon pk" title="Primary Key">🔑</span>`;
    else if (f.kind === 'fk') iconHtml = `<span class="field-icon fk" title="Foreign Key">🗝️</span>`;
    else iconHtml = `<span class="field-icon idx" title="Column">●</span>`;

    html += `
      <div class="field-row" id="field-${e.id}-${f.name}">
        ${iconHtml}
        <span class="field-name">${f.name}</span>
        <span class="field-type">${f.type}</span>
      </div>`;
  });

  html += `</div>`;
  el.innerHTML = html;
  canvas.appendChild(el);
  domEntities[e.id] = el;

  makeDraggable(el, e);
});

// ─────────────────────────────────────────────
// DRAW RELATIONS
// ─────────────────────────────────────────────
function getFieldAnchor(entityId, fieldName, side) {
  const e  = entities.find(x => x.id === entityId);
  const el = domEntities[entityId];
  const rect = el.getBoundingClientRect(); // unused; use stored pos

  const x = parseFloat(el.style.left);
  const y = parseFloat(el.style.top);

  const fieldIndex = e.fields.findIndex(f => f.name === fieldName);
  const fy = y + HEADER_H + fieldIndex * ROW_H + ROW_H / 2;
  const fx = side === 'right' ? x + ENTITY_WIDTH : x;
  return { x: fx, y: fy };
}

function midX(e1id, e2id) {
  const e1 = entities.find(x => x.id === e1id);
  const e2 = entities.find(x => x.id === e2id);
  return parseFloat(domEntities[e1id].style.left) < parseFloat(domEntities[e2id].style.left)
    ? ['right', 'left'] : ['left', 'right'];
}

function drawLines() {
  svg.innerHTML = '';

  // Define arrow markers
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');

  ['solid', 'dashed'].forEach(style => {
    const color = style === 'solid' ? '#a78bfa' : '#f59e0b';
    const id    = 'arrow-' + style;

    // Many side: crowfoot (3 lines)
    const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
    marker.setAttribute('id', id);
    marker.setAttribute('markerWidth', '12');
    marker.setAttribute('markerHeight', '12');
    marker.setAttribute('refX', '6');
    marker.setAttribute('refY', '6');
    marker.setAttribute('orient', 'auto');
    marker.innerHTML = `
      <line x1="0" y1="2" x2="10" y2="6" stroke="${color}" stroke-width="1.5"/>
      <line x1="0" y1="10" x2="10" y2="6" stroke="${color}" stroke-width="1.5"/>
      <line x1="0" y1="6"  x2="10" y2="6" stroke="${color}" stroke-width="1.5"/>
    `;
    defs.appendChild(marker);

    // One side: single tick
    const marker2 = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
    marker2.setAttribute('id', id + '-one');
    marker2.setAttribute('markerWidth', '8');
    marker2.setAttribute('markerHeight', '12');
    marker2.setAttribute('refX', '4');
    marker2.setAttribute('refY', '6');
    marker2.setAttribute('orient', 'auto');
    marker2.innerHTML = `
      <line x1="4" y1="1" x2="4" y2="11" stroke="${color}" stroke-width="1.8"/>
    `;
    defs.appendChild(marker2);
  });

  svg.appendChild(defs);

  relations.forEach(([fromId, fromField, toId, toField, style, label]) => {
    const [fromSide, toSide] = midX(fromId, toId);
    const p1 = getFieldAnchor(fromId, fromField, fromSide);
    const p2 = getFieldAnchor(toId, toField, toSide);

    const color   = style === 'solid' ? '#a78bfa' : '#f59e0b';
    const dashArr = style === 'dashed' ? '6,4' : 'none';

    // Bezier control points
    const dx = Math.abs(p2.x - p1.x) * 0.5;
    const c1x = fromSide === 'right' ? p1.x + dx : p1.x - dx;
    const c2x = toSide   === 'right' ? p2.x + dx : p2.x - dx;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${p1.x},${p1.y} C${c1x},${p1.y} ${c2x},${p2.y} ${p2.x},${p2.y}`);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', '1.8');
    path.setAttribute('stroke-dasharray', dashArr);
    path.setAttribute('marker-start', `url(#arrow-${style}-one)`);
    path.setAttribute('marker-end',   `url(#arrow-${style})`);
    svg.appendChild(path);

    // Label
    const mx = (p1.x + p2.x) / 2;
    const my = (p1.y + p2.y) / 2 - 10;
    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    txt.setAttribute('x', mx);
    txt.setAttribute('y', my);
    txt.setAttribute('text-anchor', 'middle');
    txt.setAttribute('font-size', '10');
    txt.setAttribute('font-family', 'Segoe UI, Arial, sans-serif');
    txt.setAttribute('fill', color);
    txt.setAttribute('font-weight', '600');

    // Background rect for text
    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bg.setAttribute('x', mx - 20);
    bg.setAttribute('y', my - 11);
    bg.setAttribute('width', '40');
    bg.setAttribute('height', '14');
    bg.setAttribute('rx', '3');
    bg.setAttribute('fill', '#1e1e2e');
    svg.appendChild(bg);

    txt.textContent = label;
    svg.appendChild(txt);
  });
}

drawLines();

// ─────────────────────────────────────────────
// DRAG ENTITIES
// ─────────────────────────────────────────────
function makeDraggable(el, entityData) {
  let startX, startY, origX, origY, dragging = false;

  el.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    dragging = true;
    startX = e.clientX;
    startY = e.clientY;
    origX  = parseFloat(el.style.left);
    origY  = parseFloat(el.style.top);
    el.classList.add('active');
    e.preventDefault();
    e.stopPropagation();

    const onMove = ev => {
      if (!dragging) return;
      const dx = (ev.clientX - startX) / canvasScale;
      const dy = (ev.clientY - startY) / canvasScale;
      el.style.left = Math.max(0, origX + dx) + 'px';
      el.style.top  = Math.max(0, origY + dy) + 'px';
      drawLines();
    };
    const onUp = () => {
      dragging = false;
      el.classList.remove('active');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// ─────────────────────────────────────────────
// PAN CANVAS
// ─────────────────────────────────────────────
const wrap = document.getElementById('canvas-wrap');
let canvasX = -100, canvasY = -20, canvasScale = 0.72;
let panning = false, panStartX, panStartY, panOrigX, panOrigY;

function applyTransform() {
  canvas.style.transform = `translate(${canvasX}px, ${canvasY}px) scale(${canvasScale})`;
  canvas.style.transformOrigin = '0 0';
}
applyTransform();

wrap.addEventListener('mousedown', e => {
  if (e.target !== wrap && e.target !== canvas && e.target !== svg) return;
  panning   = true;
  panStartX = e.clientX;
  panStartY = e.clientY;
  panOrigX  = canvasX;
  panOrigY  = canvasY;
  wrap.classList.add('panning');
});

document.addEventListener('mousemove', e => {
  if (!panning) return;
  canvasX = panOrigX + (e.clientX - panStartX);
  canvasY = panOrigY + (e.clientY - panStartY);
  applyTransform();
});

document.addEventListener('mouseup', () => {
  panning = false;
  wrap.classList.remove('panning');
});

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const delta  = e.deltaY > 0 ? -0.06 : 0.06;
  canvasScale  = Math.min(2, Math.max(0.2, canvasScale + delta));
  applyTransform();
}, { passive: false });

function resetView() {
  canvasX = -100; canvasY = -20; canvasScale = 0.72;
  applyTransform();
}
function zoomIn()  { canvasScale = Math.min(2,   canvasScale + 0.1); applyTransform(); }
function zoomOut() { canvasScale = Math.max(0.2,  canvasScale - 0.1); applyTransform(); }
</script>
</body>
</html>
